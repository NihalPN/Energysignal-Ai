[tool.black]
line-length = 100
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
/(
  # Exclude specific directories from formatting
  | \.git
  | \.venv
  | __pycache__
)/
'''

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --tb=short"
testpaths = [
    "tests",
]

[tool.isort]
profile = "black"
line_length = 100
