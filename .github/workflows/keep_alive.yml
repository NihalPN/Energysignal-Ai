name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render App
        run: |
          curl -L -s -o /dev/null -w "%{http_code}" https://energysignal-ai.onrender.com/
