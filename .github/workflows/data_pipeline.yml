name: ENTSO-E Data Ingestion Pipeline

on:
  schedule:
    # Runs at the top of every hour automatically
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows you to trigger the backfill manually via the GitHub UI

jobs:
  backfill-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas entsoe-py

      - name: Run Backfill Script
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        run: python data_pipeline/entsoe_backfill.py

      - name: Commit and Push Updated Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only commit if the SQLite database file actually changed
          if git diff --quiet energy_data.db; then
            echo "No new data to commit."
          else
            git add energy_data.db
            git commit -m "Automated data backfill: ENTSO-E 15-min MTU"
            git push
          fi
