name: RAG Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest black flake8
        
        # NOTE: If your project needs specific libraries to run (like pandas, requests, etc.), 
        # uncomment the line below to install them on the GitHub server so your tests don't fail.
        pip install -r requirements-api.txt
        
    - name: Format Check (Black)
      run: |
        # Scans all folders (api, llm, database, tests) in the root. 
        # Black automatically ignores venv, .git, and __pycache__ by default.
        black --check . --extend-exclude "database/schema\.py|dashboard/app\.py"
        
    - name: Lint Check (Flake8)
      run: |
        # Scans the root but explicitly tells Flake8 to ignore massive or irrelevant folders.
        flake8 . --exclude=venv,.git,__pycache__,.pytest_cache,database/schema.py,dashboard/app.py --max-line-length=200 --extend-ignore=E402,W293,W291
        
    - name: Run Pytest
      env:
        # Inject your secrets so the runner doesn't crash when initializing clients
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        # Executes all tests inside your dedicated tests/ folder
        pytest tests/ -v
