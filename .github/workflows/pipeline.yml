name: EnergySignal Daily Pipeline

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Define permissions here so the job can push back to the repo
    permissions:
      contents: write 

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas xgboost scikit-learn sqlalchemy entsoe-py openmeteo-requests requests-cache retry-requests holidays python-dotenv tenacity

      - name: Setting database and running pipeline
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        run: |
          python database/schema.py
          python data_pipeline/backfill.py
          python data_pipeline/patch_generation.py
          python data_pipeline/scheduler.py
          python feature/build_feature.py

      - name: Train Model & Export Metrics
        run: |
          python models/xgboost_model.py
          python scripts/export_metrics.py

      - name: Commit and Push Updated Models
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          # Adding the force flag (-f) to override the .gitignore
          git add -f models/xgb_baseline.json models/metrics.json
          git commit -m "Auto-update: Daily Model Retraining & Metrics" || echo "No changes to commit"
          # Push using the built-in GITHUB_TOKEN
          git pull --rebase --autostash origin main
          git push origin main
